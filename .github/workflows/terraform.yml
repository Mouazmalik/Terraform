name: Terraform Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create credentials file
        run: |
          cat <<EOF > ${{ github.workspace }}/key.json
          ${{ secrets.GCP_CREDENTIALS }}
          EOF
          
          ls -lh ${{ github.workspace }}/key.json
          head -c 10 ${{ github.workspace }}/key.json
          echo -e "\n"
          tail -c 10 ${{ github.workspace }}/key.json

      - name: Set GCP Environment Variable
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/key.json" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve