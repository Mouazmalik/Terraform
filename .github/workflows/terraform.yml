name: "Terraform GCS Deployments"

on:
  push:
    branches:
      - main  # Jab aap main branch par push karein tab pipeline chale

# WIF ke liye ye permissions mandatory hain
permissions:
  contents: read
  id-token: write 

jobs:
  terraform:
    name: "Terraform Job"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud using WIF
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Aapka exact provider path
          workload_identity_provider: 'projects/305318903527/locations/global/workloadIdentityPools/mouaz-pool/providers/github-provider'
          service_account: 'terraform@scrapemore.iam.gserviceaccount.com'

      # 2. Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. Terraform Init (GCS backend se connect karega)
      - name: Terraform Init
        run: terraform init

      # 4. Terraform Plan
      - name: Terraform Plan
        run: terraform plan -input=false

      # 5. Terraform Apply (Sirf tab chalega jab changes main branch par merge hon)
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false