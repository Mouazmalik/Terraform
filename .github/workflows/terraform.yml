name: Terraform Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Authenticate to GCP
        env:
          GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}
        run: |
          echo "=== Secret length: ${#GCP_SA_KEY_B64} chars ==="
          if [ -z "$GCP_SA_KEY_B64" ]; then
            echo "::error::Secret GCP_SA_KEY_B64 is empty!"
            exit 1
          fi
          printf '%s' "$GCP_SA_KEY_B64" | base64 -d > $HOME/gcp-key.json
          echo "=== Decoded file size: $(wc -c < $HOME/gcp-key.json) bytes ==="
          echo "=== First 20 chars: $(head -c 20 $HOME/gcp-key.json) ==="
          echo "=== Last 10 chars: $(tail -c 10 $HOME/gcp-key.json) ==="
          jq empty $HOME/gcp-key.json && echo "=== JSON valid ===" || { echo "::error::Decoded JSON is invalid!"; exit 1; }
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply 