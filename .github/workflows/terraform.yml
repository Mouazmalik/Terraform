name: Terraform Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 🔐 Create credentials file
      - name: Create credentials file
        run: |
          echo "${{ secrets.GCP_CREDENTIALS_BASE64 }}" | base64 -d > key.json

          echo "==== FILE CHECK ===="
          ls -lh key.json
          head -n 3 key.json

      # 🧪 Install jq (IMPORTANT FIX)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🧪 Validate JSON
      - name: Validate JSON
        run: jq . key.json

      # 🌍 Set env (IMPORTANT: early + correct scope)
      - name: Set GCP Environment Variable
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/key.json" >> $GITHUB_ENV

      # 🚀 Terraform Init
      - name: Terraform Init
        run: terraform init

      # 📊 Terraform Plan
      - name: Terraform Plan
        run: terraform plan

      # 🚀 Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve