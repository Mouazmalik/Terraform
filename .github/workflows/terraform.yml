name: Terraform Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      #  Write raw JSON credentials to file via env var (avoids base64 and shell escaping issues)
      - name: Create credentials file
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: echo "$GCP_CREDENTIALS" > key.json

      #  Set environment variable
      - name: Set env
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/key.json" >> $GITHUB_ENV

      #  Terraform Init (with GODEBUG)
      - name: Terraform Init
        run: |
          export GODEBUG=x509ignoreCN=1
          terraform init

      #  Terraform Plan
      - name: Terraform Plan
        run: terraform plan

      #  Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve