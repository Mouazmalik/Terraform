name: Terraform Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      #  Create GCP credentials file (BASE64 FIX)
      - name: Create credentials file
        run: |
          echo "${{ secrets.GCP_CREDENTIALS }}" | base64 -d > key.json
          # Validate the file was written correctly
          if [ ! -s key.json ]; then
            echo "ERROR: key.json is empty — GCP_CREDENTIALS secret may not be set or is not valid base64"
            exit 1
          fi
          python3 -c "import json,sys; json.load(open('key.json'))" || { echo "ERROR: key.json is not valid JSON — re-encode with: cat key.json | base64 -w 0"; exit 1; }

      #  Set environment variable
      - name: Set env
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=key.json" >> $GITHUB_ENV

      #  Terraform Init (with GODEBUG)
      - name: Terraform Init
        run: |
          export GODEBUG=x509ignoreCN=1
          terraform init

      #  Terraform Plan
      - name: Terraform Plan
        run: terraform plan

      #  Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve